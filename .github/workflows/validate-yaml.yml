name: Validate YAML

on:
  pull_request:
    paths:
      - 'impact-analysis.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate YAML syntax
        run: npx js-yaml impact-analysis.yaml
